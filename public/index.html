<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Feed</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-brand">
                    <i class="fas fa-fire"></i>
                    <span>SocialHub</span>
                </div>
                <div class="navbar-menu" id="navbarMenu">
                    <a href="#" onclick="loadFeed()" class="nav-link">Feed</a>
                    <a href="#" onclick="loadExplore()" class="nav-link">Explore</a>
                    <a href="#" onclick="loadProfile()" class="nav-link">Profile</a>
                    <button onclick="logout()" class="nav-btn logout-btn">Logout</button>
                </div>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div class="auth-container">
                <div class="auth-form">
                    <h1>Welcome to SocialHub</h1>
                    <p>Connect with friends and share your thoughts</p>
                    
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showTab('login')">Login</button>
                        <button class="tab-btn" onclick="showTab('register')">Register</button>
                    </div>

                    <!-- Login Form -->
                    <div id="loginTab" class="tab-content active">
                        <input type="email" id="loginEmail" placeholder="Email" class="input-field">
                        <input type="password" id="loginPassword" placeholder="Password" class="input-field">
                        <button onclick="login()" class="btn btn-primary">Login</button>
                    </div>

                    <!-- Register Form -->
                    <div id="registerTab" class="tab-content">
                        <input type="text" id="registerUsername" placeholder="Username" class="input-field">
                        <input type="email" id="registerEmail" placeholder="Email" class="input-field">
                        <input type="password" id="registerPassword" placeholder="Password" class="input-field">
                        <button onclick="register()" class="btn btn-primary">Register</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Feed Section -->
        <div id="mainSection" class="main-section" style="display: none;">
            <div class="container">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="user-card">
                        <img id="sidebarProfilePic" src="https://via.placeholder.com/100" alt="Profile" class="profile-pic">
                        <h3 id="sidebarUsername">Username</h3>
                        <p id="sidebarBio">Bio here</p>
                        <div class="stats">
                            <div class="stat">
                                <span id="followersCount">0</span>
                                <span>Followers</span>
                            </div>
                            <div class="stat">
                                <span id="followingCount">0</span>
                                <span>Following</span>
                            </div>
                        </div>
                        <button onclick="editProfile()" class="btn btn-outline">Edit Profile</button>
                    </div>
                </aside>

                <!-- Feed -->
                <main class="feed">
                    <!-- Create Post -->
                    <div class="post-creator">
                        <img id="creatorProfilePic" src="https://via.placeholder.com/50" alt="Profile" class="profile-pic-sm">
                        <div class="post-input-group">
                            <textarea id="postContent" placeholder="What's on your mind?" class="post-input"></textarea>
                            <input type="text" id="postImage" placeholder="Image URL (optional)" class="post-input">
                            <button onclick="createPost()" class="btn btn-primary">Post</button>
                        </div>
                    </div>

                    <!-- Posts Feed -->
                    <div id="feedContainer" class="posts-container">
                        <!-- Posts will be loaded here -->
                    </div>
                </main>

                <!-- Right Sidebar -->
                <aside class="right-sidebar">
                    <div class="suggested-users">
                        <h3>Suggested Users</h3>
                        <div id="suggestedUsersContainer" class="users-list">
                            <!-- Users will be loaded here -->
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <!-- Modal for editing profile -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Edit Profile</h2>
            <input type="text" id="editBio" placeholder="Bio" class="input-field">
            <input type="text" id="editProfilePic" placeholder="Profile Picture URL" class="input-field">
            <button onclick="saveProfile()" class="btn btn-primary">Save Changes</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
